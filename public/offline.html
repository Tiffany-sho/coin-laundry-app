<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>オフライン — Collecie</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', system-ui, sans-serif;
      background: #F0F9FF;
      color: #1E3A5F;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 2px 12px rgba(8,145,178,0.08);
      padding: 40px 32px;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      color: #0E7490;
      margin-bottom: 8px;
    }
    .message {
      font-size: 14px;
      color: #64748B;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .btn {
      display: inline-block;
      background: #0891B2;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      min-height: 48px;
      transition: background 0.15s;
    }
    .btn:hover { background: #0E7490; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <p class="title">オフラインです</p>
    <p class="message">
      インターネットに接続されていません。<br />
      接続を確認してから再試行してください。
    </p>
    <button class="btn" onclick="location.reload()">再読み込み</button>
  </div>
</body>
</html>
